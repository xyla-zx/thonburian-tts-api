services:
  thonburian-tts:
    image: xylamana/thonburian-tts:latest
    container_name: thonburian-tts
    restart: unless-stopped
    ports:
      - "8000:8000"  # เข้าใช้ API ผ่าน port 8000 (เปลี่ยนได้ตามต้องการ)
    volumes:
      - tts_outputs:/app/outputs        # เก็บไฟล์เสียงที่สร้าง
      - tts_models:/app/models_cache    # cache model weights จาก HuggingFace
      - tts_refs:/app/ref_samples       # เก็บ reference voice samples
    environment:
      - HF_HOME=/app/models_cache
      - TORCH_HOME=/app/models_cache
      - TRANSFORMERS_CACHE=/app/models_cache
      - PYTHONUNBUFFERED=1
    # uncomment ถ้ามี GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 30s
      start_period: 300s
      retries: 3

volumes:
  tts_outputs:
  tts_models:
  tts_refs:
